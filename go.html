<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="dark">
<title>go — mission control</title>
<style>
  :root {
    --bg: #0b0d12;
    --fg: #e6e8ee;
    --muted: #7a7f8c;
    --accent: #7fd4ff;
    --err: #ff7a7a;
    --card: #141820;
    --border: #232834;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0 0 24px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .status {
    font-size: 15px;
    color: var(--fg);
    line-height: 1.5;
  }
  .status.err { color: var(--err); }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }
  .url {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    color: var(--accent);
    word-break: break-all;
    background: #0b0d12;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-top: 10px;
    display: block;
  }
  a.btn {
    display: inline-block;
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--accent);
    color: #0b0d12;
    text-decoration: none;
    font-weight: 600;
    border-radius: 8px;
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
</style>
</head>
<body>
<main>
  <h1>mission control · go</h1>
  <div class="card">
    <div id="status" class="status">
      <span class="spinner"></span>resolving tunnel URL…
    </div>
    <div id="hint" class="hint"></div>
    <div id="manual" style="display:none;">
      <span id="manual-url" class="url"></span>
      <a id="manual-link" class="btn" href="#">Open manually</a>
    </div>
    <div id="meta" class="meta"></div>
  </div>
</main>
<script>
(function () {
  "use strict";

  var RAW_URL =
    "https://raw.githubusercontent.com/l12203685/digital-immortality/main/public_url.json";

  var statusEl = document.getElementById("status");
  var hintEl = document.getElementById("hint");
  var metaEl = document.getElementById("meta");
  var manualEl = document.getElementById("manual");
  var manualUrlEl = document.getElementById("manual-url");
  var manualLinkEl = document.getElementById("manual-link");

  function getToken() {
    try {
      var p = new URLSearchParams(window.location.search);
      var t = p.get("t");
      return t ? String(t) : "";
    } catch (e) {
      return "";
    }
  }

  function formatTaipei(iso) {
    if (!iso) return "unknown";
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      var opts = {
        timeZone: "Asia/Taipei",
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit",
        hour12: false
      };
      return d.toLocaleString("en-GB", opts) + " (Asia/Taipei)";
    } catch (e) {
      return iso;
    }
  }

  function fail(msg, extra) {
    statusEl.className = "status err";
    statusEl.textContent = "error: " + msg;
    if (extra) {
      hintEl.textContent = extra;
    }
  }

  function showManual(base, token) {
    var full = token ? (base.replace(/\/+$/, "") + "/?t=" + encodeURIComponent(token)) : base;
    manualUrlEl.textContent = full;
    manualLinkEl.setAttribute("href", full);
    manualEl.style.display = "block";
  }

  function redirect(base, token, updatedAt) {
    var stripped = base.replace(/\/+$/, "");
    var target = token
      ? stripped + "/?t=" + encodeURIComponent(token)
      : stripped + "/";
    statusEl.innerHTML = '<span class="spinner"></span>redirecting…';
    hintEl.textContent = "target: " + stripped;
    metaEl.textContent = "updated " + formatTaipei(updatedAt);
    // Give the user a visual beat so the page isn't a flash.
    setTimeout(function () {
      window.location.replace(target);
    }, 120);
  }

  function load() {
    var token = getToken();
    var bust = "?_=" + Date.now();
    fetch(RAW_URL + bust, { cache: "no-store", mode: "cors" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        if (!data || typeof data.url !== "string" || data.url.indexOf("http") !== 0) {
          throw new Error("invalid public_url.json");
        }
        var updated = data.updated_at || "";
        metaEl.textContent = "updated " + formatTaipei(updated);
        showManual(data.url, token);
        redirect(data.url, token, updated);
      })
      .catch(function (err) {
        fail(
          String(err && err.message ? err.message : err),
          "failed to fetch public_url.json — daemon may be stalled"
        );
      });
  }

  load();
})();
</script>
</body>
</html>
