<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZERO Console</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#1c2128;--border:#30363d;
  --text:#c9d1d9;--muted:#8b949e;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--accent:#6bd3a0;--accent2:#58a6ff;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);overflow:hidden;font:13px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column}

/* ── toolbar ──────────────────────────────────────────────── */
#toolbar{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;height:36px;flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
}
#toolbar-title{font-weight:700;font-size:12px;letter-spacing:.04em;flex:1}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.tb-dot.offline{background:var(--red);animation:none}
.tb-dot.green{background:var(--green)}
.tb-dot.yellow{background:var(--yellow)}
.tb-dot.red{background:var(--red)}
.tb-dot.live{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tb-btn{
  background:none;border:1px solid var(--border);border-radius:5px;
  color:var(--muted);font-size:11px;line-height:1;padding:3px 7px;
  cursor:pointer;transition:color .12s,border-color .12s;white-space:nowrap;
}
.tb-btn:hover{color:var(--text);border-color:var(--accent)}

/* ── tabs ─────────────────────────────────────────────────── */
#tabs{
  display:flex;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab-btn{
  flex:1;background:none;border:none;color:var(--muted);
  padding:9px 10px;font:inherit;font-size:12px;font-weight:600;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color .12s,border-color .12s,background .12s;
}
.tab-btn:hover{color:var(--text);background:var(--panel2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── panes ────────────────────────────────────────────────── */
.pane{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
.pane.active{display:flex}

/* ── Realtime pane ────────────────────────────────────────── */
#pane-realtime{padding:0}
.section-title{
  font-size:10px;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;padding:8px 12px 4px;flex-shrink:0;
}

/* Health strip */
.health-strip{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;border-bottom:1px solid var(--border);
  background:var(--panel);flex-shrink:0;
}
.health-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0}
.health-dot.green{background:var(--green)}
.health-dot.yellow{background:var(--yellow)}
.health-dot.red{background:var(--red)}
.health-dot.offline{background:var(--red);opacity:.5}
.health-label{font-weight:600;font-size:12px;flex-shrink:0}
.health-sub{color:var(--muted);font-size:10px;font-family:var(--mono);margin-left:auto;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* System meters */
.meters{display:flex;gap:6px;padding:6px 12px;flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:10px}
.meter{flex:1;background:var(--panel2);border:1px solid var(--border);
  border-radius:5px;padding:4px 6px;text-align:center;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meter .m-lbl{color:var(--muted);font-size:9px;letter-spacing:.04em}
.meter .m-val{color:var(--text);font-weight:700;font-size:11px;margin-top:1px}
.meter.warn .m-val{color:var(--yellow)}
.meter.alert .m-val{color:var(--red)}

/* Chat stream */
#chat-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:6px 10px;display:flex;flex-direction:column;gap:6px;
  min-height:0;
}
.msg{
  background:var(--panel);border:1px solid var(--border);border-radius:7px;
  padding:6px 8px;font-size:12px;line-height:1.45;
  white-space:pre-wrap;word-break:break-word;
}
.msg.in{border-left:2px solid var(--accent2)}   /* incoming (Edward) */
.msg.out{border-left:2px solid var(--accent);background:var(--panel2)} /* agent outbox */
.msg.self{border-left:2px solid var(--muted);opacity:.85} /* extension own */
.msg-meta{font-size:9.5px;color:var(--muted);font-family:var(--mono);
  display:flex;justify-content:space-between;margin-bottom:3px;gap:6px}
.msg-ch{color:var(--accent2);text-transform:uppercase;letter-spacing:.04em}
.msg-empty{color:var(--muted);font-size:11px;text-align:center;padding:24px 8px;font-style:italic}

/* Branch/tree list */
#branch-list{padding:0 10px 4px;display:flex;flex-direction:column;gap:3px;
  max-height:140px;overflow-y:auto;flex-shrink:0}
.branch-card{
  background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:5px 8px;display:flex;align-items:center;gap:7px;font-size:11px;
}
.b-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.b-dot.green{background:var(--green)}
.b-dot.yellow{background:var(--yellow)}
.b-dot.red{background:var(--red)}
.b-name{font-weight:600;flex-shrink:0}
.b-status{color:var(--muted);font-family:var(--mono);font-size:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

/* Command input */
#cmd-bar{
  display:flex;gap:5px;padding:8px 10px;
  border-top:1px solid var(--border);background:var(--panel);flex-shrink:0;
}
#cmd-input{
  flex:1;background:var(--panel2);color:var(--text);
  border:1px solid var(--border);border-radius:6px;padding:7px 9px;
  font:inherit;font-size:12px;outline:none;min-height:32px;
  resize:none;max-height:80px;
}
#cmd-input:focus{border-color:var(--accent)}
#cmd-btn{
  background:var(--accent);color:#022;border:none;border-radius:6px;
  padding:0 12px;font:inherit;font-weight:700;font-size:12px;
  cursor:pointer;min-height:32px;
}
#cmd-btn:hover{opacity:.85}
#cmd-btn:disabled{opacity:.4;cursor:not-allowed}
#cmd-status{font-size:10px;color:var(--muted);padding:0 10px 4px;font-family:var(--mono);min-height:12px}
#cmd-status.ok{color:var(--green)}
#cmd-status.err{color:var(--red)}

/* ── Daily pane (iframe) ──────────────────────────────────── */
#pane-daily{position:relative}
#dash-frame{width:100%;height:100%;border:none;background:var(--bg);flex:1}
#offline-notice{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:32px 20px;text-align:center;
  position:absolute;inset:0;background:var(--bg);z-index:10;
}
#offline-notice.visible{display:flex}
.offline-icon{font-size:32px;opacity:.5}
.offline-title{font-size:14px;font-weight:700}
.offline-sub{font-size:11px;color:var(--muted);line-height:1.5}
.offline-retry{background:var(--accent);color:#022;border:none;border-radius:7px;
  padding:7px 16px;font:inherit;font-weight:700;font-size:12px;cursor:pointer;margin-top:4px}
.offline-retry:hover{opacity:.85}

/* ── Ask-this-page pane ───────────────────────────────────── */
#pane-askpage{padding:0;display:none;flex-direction:column;overflow:hidden;min-height:0}
#pane-askpage.active{display:flex}
#askpage-header{
  padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;display:flex;flex-direction:column;gap:4px;
}
#askpage-title{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
#askpage-url{font-size:10px;color:var(--muted);font-family:var(--mono);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#askpage-actions{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--panel)}
.askpage-btn{
  background:var(--panel2);color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;font:inherit;font-size:11.5px;
  cursor:pointer;transition:border-color .12s,color .12s;
}
.askpage-btn:hover{border-color:var(--accent);color:var(--accent)}
.askpage-btn:disabled{opacity:.4;cursor:not-allowed}
#askpage-output{
  flex:1;overflow-y:auto;padding:10px 12px;font-size:12px;line-height:1.55;
  white-space:pre-wrap;word-break:break-word;
  background:var(--bg);min-height:0;
}
.askpage-empty{color:var(--muted);font-style:italic;text-align:center;padding:24px 8px}
.askpage-meta{font-size:10px;color:var(--muted);font-family:var(--mono);
  padding:4px 12px 0;flex-shrink:0}
#askpage-input-bar{
  display:flex;gap:5px;padding:8px 10px;
  border-top:1px solid var(--border);background:var(--panel);flex-shrink:0;
}
#askpage-input{
  flex:1;background:var(--panel2);color:var(--text);
  border:1px solid var(--border);border-radius:6px;padding:7px 9px;
  font:inherit;font-size:12px;outline:none;min-height:32px;
  resize:none;max-height:80px;
}
#askpage-input:focus{border-color:var(--accent)}
#askpage-send{
  background:var(--accent);color:#022;border:none;border-radius:6px;
  padding:0 12px;font:inherit;font-weight:700;font-size:12px;
  cursor:pointer;min-height:32px;
}
#askpage-send:hover{opacity:.85}
#askpage-send:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>

<div id="toolbar">
  <span id="toolbar-title">ZERO Console</span>
  <div class="tb-dot" id="sse-dot" title="SSE stream"></div>
  <div class="tb-dot" id="health-dot-tb" title="Server health"></div>
  <button class="tb-btn" id="btn-reload" title="Reload dashboard">↺</button>
  <button class="tb-btn" id="btn-open" title="Open in tab">↗</button>
</div>

<div id="tabs">
  <button class="tab-btn active" data-tab="realtime">即時</button>
  <button class="tab-btn" data-tab="daily">日常</button>
  <button class="tab-btn" data-tab="askpage">問頁</button>
</div>

<!-- ─────────────── Realtime pane ─────────────── -->
<section class="pane active" id="pane-realtime">

  <div class="health-strip">
    <div class="health-dot" id="health-dot"></div>
    <span class="health-label" id="health-label">Loading…</span>
    <span class="health-sub" id="health-sub"></span>
  </div>

  <div class="meters" id="meters">
    <div class="meter" id="meter-cpu"><div class="m-lbl">CPU</div><div class="m-val">–</div></div>
    <div class="meter" id="meter-ram"><div class="m-lbl">RAM</div><div class="m-val">–</div></div>
    <div class="meter" id="meter-disk"><div class="m-lbl">DISK</div><div class="m-val">–</div></div>
    <div class="meter" id="meter-ctx"><div class="m-lbl">CTX</div><div class="m-val">–</div></div>
  </div>

  <div class="section-title">永生樹 Branches</div>
  <div id="branch-list">
    <div class="msg-empty">載入中…</div>
  </div>

  <div class="section-title">GM ↔ Edward</div>
  <div id="chat-scroll">
    <div class="msg-empty">尚無訊息。</div>
  </div>

  <div id="cmd-status"></div>
  <div id="cmd-bar">
    <textarea id="cmd-input" rows="1" maxlength="2000" placeholder="傳送到 MC inbox… (Enter 送出)"></textarea>
    <button id="cmd-btn">送</button>
  </div>

</section>

<!-- ─────────────── Ask-this-page pane ─────────────── -->
<section class="pane" id="pane-askpage">
  <div id="askpage-header">
    <div id="askpage-title">— no page loaded —</div>
    <div id="askpage-url"></div>
  </div>
  <div id="askpage-actions">
    <button class="askpage-btn" id="askpage-load" title="Read the active tab">讀取此頁</button>
    <button class="askpage-btn" id="askpage-summarize" disabled>Summarize</button>
    <button class="askpage-btn" id="askpage-clear" disabled>清空</button>
  </div>
  <div id="askpage-output">
    <div class="askpage-empty">點「讀取此頁」抓取當前分頁內容，然後問任何問題。</div>
  </div>
  <div class="askpage-meta" id="askpage-meta"></div>
  <div id="askpage-input-bar">
    <textarea id="askpage-input" rows="1" maxlength="2000"
              placeholder="問任何關於這頁的問題… (Enter 送出)" disabled></textarea>
    <button id="askpage-send" disabled>問</button>
  </div>
</section>

<!-- ─────────────── Daily pane (iframe) ─────────────── -->
<section class="pane" id="pane-daily">
  <iframe
    id="dash-frame"
    src="about:blank"
    referrerpolicy="no-referrer"
  ></iframe>
  <div id="offline-notice">
    <div class="offline-icon">⚡</div>
    <div class="offline-title">Dashboard offline</div>
    <div class="offline-sub">
      Cannot reach <code>localhost:7878</code> or the relay.<br>
      Start the Mission Control server (or check internet), then retry.
    </div>
    <button class="offline-retry" id="btn-retry">Retry</button>
  </div>
</section>

<script src="sidepanel.js"></script>
</body>
</html>
