<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數位永生 Mind Map</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-alt: #0f3460;
  --text: #e0e0e0;
  --text-dim: #888;
  --text-bright: #fff;
  --accent: #e94560;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --grey: #6b7280;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --border: #2a2a4a;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  flex-shrink: 0;
}

.header h1 {
  font-size: 1.2rem;
  color: var(--text-bright);
  font-weight: 600;
}

.header h1 span { color: var(--accent); }

.header-meta {
  display: flex;
  gap: 1.5rem;
  align-items: center;
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-dim);
}

.header-meta .clock { color: var(--blue); }

.refresh-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Legend */
.legend {
  display: flex;
  gap: 1.2rem;
  padding: 0.4rem 1.5rem;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 0.72rem;
  font-family: var(--mono);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Mind Map Container */
#mindmap-wrap {
  flex: 1;
  position: relative;
  min-height: 400px;
  overflow: hidden;
}

#mindmap-wrap svg {
  width: 100%;
  height: 100%;
}

#mindmap-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.9rem;
  color: var(--text-dim);
}

/* Zoom controls */
.zoom-controls {
  position: absolute;
  bottom: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}

.zoom-controls button {
  width: 32px;
  height: 32px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.zoom-controls button:hover {
  background: var(--bg-card-alt);
}

/* Bottom Panel */
.bottom-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
}

/* Status Cards */
.status-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.6rem;
  padding: 0.8rem 1.2rem;
}

.status-card {
  background: var(--bg);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
}

.status-card .label {
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-family: var(--mono);
}

.status-card .value {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-bright);
  font-family: var(--mono);
  margin-top: 0.15rem;
}

.status-card .sub {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* Timeline strip */
.timeline-strip {
  display: flex;
  gap: 0.5rem;
  padding: 0.5rem 1.2rem 0.8rem;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 0.7rem;
}

.timeline-strip::-webkit-scrollbar { height: 4px; }
.timeline-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.cycle-chip {
  flex-shrink: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.4rem 0.7rem;
  min-width: 140px;
}

.cycle-chip .cycle-num {
  color: var(--accent);
  font-weight: 600;
}

.cycle-chip .cycle-ts {
  color: var(--blue);
  font-size: 0.65rem;
}

.cycle-chip .cycle-branches {
  color: var(--yellow);
  font-size: 0.62rem;
  margin-top: 0.15rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

/* Error */
.error-msg {
  color: var(--red);
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 0.5rem;
  background: rgba(248,113,113,0.08);
  border-radius: 4px;
  text-align: center;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 0.6rem 1rem; }
  .header h1 { font-size: 1rem; }
  .status-row { grid-template-columns: repeat(3, 1fr); gap: 0.4rem; padding: 0.6rem 0.8rem; }
  .status-card { padding: 0.4rem 0.6rem; }
  .status-card .value { font-size: 0.9rem; }
  .legend { padding: 0.3rem 0.8rem; gap: 0.8rem; }
}

@media (max-width: 480px) {
  .status-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>數位永生</span> &mdash; Mind Map</h1>
  <div class="header-meta">
    <span class="clock" id="clock"></span>
    <span><span class="refresh-dot"></span> auto-refresh 5min</span>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Deadline / Urgent</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Active</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Done</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div> Blocked</div>
</div>

<div id="mindmap-wrap">
  <div id="mindmap-loading">Loading mind map...</div>
  <svg id="mindmap-svg"></svg>
  <div class="zoom-controls">
    <button onclick="zoomIn()" title="Zoom in">+</button>
    <button onclick="zoomOut()" title="Zoom out">&minus;</button>
    <button onclick="zoomFit()" title="Fit to screen">&#8689;</button>
  </div>
</div>

<div class="bottom-panel">
  <div class="status-row" id="status-row">
    <div class="status-card"><div class="label">Loading...</div></div>
  </div>
  <div class="timeline-strip" id="timeline-strip"></div>
</div>

<!-- D3.js for tree layout -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<script>
const RAW_BASE = 'https://raw.githubusercontent.com/l12203685/digital-immortality/main/results';
const URLS = {
  tree: `${RAW_BASE}/dynamic_tree.md`,
  daemon: `${RAW_BASE}/daemon_log.md`,
  daily: `${RAW_BASE}/daily_log.md`,
};

// ─── Clock ───
function updateClock() {
  const now = new Date();
  const taipei = now.toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  document.getElementById('clock').textContent = taipei + ' (Taipei)';
}
setInterval(updateClock, 1000);
updateClock();

// ─── Fetch ───
async function fetchRaw(url) {
  const res = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

// ─── Parse dynamic_tree.md into tree structure ───
function parseTreeToHierarchy(md) {
  const lines = md.split('\n');
  let lastUpdate = '';

  const root = { name: '數位永生', status: 'root', children: [] };
  let currentL1 = null;
  let currentL2 = null;

  for (const line of lines) {
    const upMatch = line.match(/最後更新：(.+)/);
    if (upMatch) { lastUpdate = upMatch[1]; continue; }

    // L1: ### N. Title
    const l1Match = line.match(/^### (\d+)\.\s+(.+)/);
    if (l1Match) {
      const title = l1Match[2].replace(/⚡.*/, '').trim();
      let status = 'active';
      if (l1Match[2].includes('DEADLINE')) status = 'deadline';
      currentL1 = { name: `${l1Match[1]}. ${title}`, status, children: [], fullTitle: l1Match[2] };
      currentL2 = null;
      root.children.push(currentL1);
      continue;
    }

    // L2: - N.N text
    const l2Match = line.match(/^- (\d+\.\d+)\s+(.+)/);
    if (l2Match && currentL1) {
      const text = l2Match[2];
      let status = detectStatus(text);
      currentL2 = { name: `${l2Match[1]} ${text}`, status, children: [] };
      currentL1.children.push(currentL2);
      continue;
    }

    // L3: indented sub-items
    const l3Match = line.match(/^\s{2,}-\s+(.+)/);
    if (l3Match && currentL2) {
      const text = l3Match[1];
      let status = detectStatus(text);
      currentL2.children.push({ name: text, status, children: [] });
      continue;
    }

    // CONSTRAINT
    if (line.match(/^- CONSTRAINT/) && currentL1) {
      const text = line.replace(/^- /, '');
      currentL1.children.push({ name: text, status: 'deadline', children: [] });
      continue;
    }
  }

  return { tree: root, lastUpdate };
}

function detectStatus(text) {
  if (text.includes('DEADLINE') || text.includes('deadline')) return 'deadline';
  if (/✓/.test(text) || /DONE/.test(text) || /done/.test(text)) return 'done';
  if (/blocked/.test(text) || /待/.test(text) || /users=0/.test(text)) return 'blocked';
  return 'active';
}

// ─── Color scheme ───
const STATUS_COLORS = {
  root: '#e94560',
  deadline: '#f87171',
  active: '#fbbf24',
  done: '#4ade80',
  blocked: '#6b7280',
};

const L1_COLORS = ['#f87171', '#60a5fa', '#fbbf24', '#a78bfa', '#4ade80', '#f472b6'];

// ─── D3 Mind Map ───
let svgEl, gEl, zoomBehavior, rootNode, treeLayout;
const DURATION = 400;
let nodeIdCounter = 0;

function initMindMap(data) {
  document.getElementById('mindmap-loading').style.display = 'none';
  const wrap = document.getElementById('mindmap-wrap');
  const width = wrap.clientWidth;
  const height = wrap.clientHeight;

  svgEl = d3.select('#mindmap-svg')
    .attr('width', width)
    .attr('height', height);

  // Clear previous
  svgEl.selectAll('*').remove();

  gEl = svgEl.append('g');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', (e) => gEl.attr('transform', e.transform));

  svgEl.call(zoomBehavior);

  // Use d3.tree layout
  treeLayout = d3.tree().nodeSize([28, 280]);

  rootNode = d3.hierarchy(data);
  rootNode.x0 = 0;
  rootNode.y0 = 0;

  // Collapse L3+ initially
  if (rootNode.children) {
    rootNode.children.forEach(l1 => {
      if (l1.children) {
        l1.children.forEach(l2 => {
          if (l2.children && l2.children.length > 0) {
            l2._children = l2.children;
            l2.children = null;
          }
        });
      }
    });
  }

  update(rootNode);

  // Center on root
  const t = d3.zoomIdentity.translate(width * 0.12, height / 2).scale(0.85);
  svgEl.transition().duration(500).call(zoomBehavior.transform, t);
}

function update(source) {
  const treeData = treeLayout(rootNode);
  const nodes = treeData.descendants();
  const links = treeData.links();

  // Normalize depth spacing
  nodes.forEach(d => { d.y = d.depth * 300; });

  // ── Nodes ──
  const node = gEl.selectAll('g.node')
    .data(nodes, d => d.id || (d.id = ++nodeIdCounter));

  const nodeEnter = node.enter().append('g')
    .attr('class', 'node')
    .attr('transform', () => `translate(${source.y0 || 0},${source.x0 || 0})`)
    .on('click', (event, d) => {
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else if (d._children) {
        d.children = d._children;
        d._children = null;
      }
      update(d);
    })
    .style('cursor', d => (d.children || d._children) ? 'pointer' : 'default');

  // Circle
  nodeEnter.append('circle')
    .attr('r', 0)
    .attr('fill', d => getNodeColor(d))
    .attr('stroke', d => getNodeColor(d))
    .attr('stroke-width', 2);

  // Label
  nodeEnter.append('text')
    .attr('dy', '0.35em')
    .attr('x', d => d.children || d._children ? -14 : 14)
    .attr('text-anchor', d => d.children || d._children ? 'end' : 'start')
    .attr('fill', '#e0e0e0')
    .attr('font-size', d => d.depth === 0 ? '14px' : d.depth === 1 ? '12px' : '10.5px')
    .attr('font-family', "'Cascadia Code','Fira Code','Consolas',monospace")
    .attr('font-weight', d => d.depth <= 1 ? '600' : '400')
    .text(d => truncateLabel(d.data.name, d.depth))
    .append('title')
    .text(d => d.data.name);

  // Expand/collapse indicator
  nodeEnter.append('text')
    .attr('class', 'expand-icon')
    .attr('dy', '0.35em')
    .attr('x', d => d.children || d._children ? 10 : -10)
    .attr('text-anchor', 'middle')
    .attr('fill', '#888')
    .attr('font-size', '9px')
    .attr('font-family', 'monospace')
    .text(d => {
      if (d._children) return `[+${d._children.length}]`;
      if (d.children && d.depth >= 1) return '';
      return '';
    });

  // Update
  const nodeUpdate = nodeEnter.merge(node);

  nodeUpdate.transition().duration(DURATION)
    .attr('transform', d => `translate(${d.y},${d.x})`);

  nodeUpdate.select('circle')
    .attr('r', d => d.depth === 0 ? 10 : d.depth === 1 ? 7 : 5)
    .attr('fill', d => (d._children) ? getNodeColor(d) : (d.children ? 'transparent' : getNodeColor(d)))
    .attr('stroke', d => getNodeColor(d));

  nodeUpdate.select('.expand-icon')
    .text(d => {
      if (d._children) return `[+${d._children.length}]`;
      return '';
    });

  // Exit
  const nodeExit = node.exit().transition().duration(DURATION)
    .attr('transform', () => `translate(${source.y},${source.x})`)
    .remove();

  nodeExit.select('circle').attr('r', 0);
  nodeExit.select('text').style('fill-opacity', 0);

  // ── Links ──
  const link = gEl.selectAll('path.link')
    .data(links, d => d.target.id);

  const linkEnter = link.enter().insert('path', 'g')
    .attr('class', 'link')
    .attr('fill', 'none')
    .attr('stroke', d => {
      const c = getNodeColor(d.target);
      return c;
    })
    .attr('stroke-opacity', 0.35)
    .attr('stroke-width', d => d.target.depth <= 1 ? 2.5 : 1.5)
    .attr('d', () => {
      const o = { x: source.x0 || 0, y: source.y0 || 0 };
      return diagonal(o, o);
    });

  const linkUpdate = linkEnter.merge(link);

  linkUpdate.transition().duration(DURATION)
    .attr('d', d => diagonal(d.source, d.target))
    .attr('stroke', d => getNodeColor(d.target))
    .attr('stroke-opacity', 0.35);

  link.exit().transition().duration(DURATION)
    .attr('d', () => {
      const o = { x: source.x, y: source.y };
      return diagonal(o, o);
    })
    .remove();

  // Stash positions
  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

function diagonal(s, d) {
  return `M ${s.y} ${s.x}
          C ${(s.y + d.y) / 2} ${s.x},
            ${(s.y + d.y) / 2} ${d.x},
            ${d.y} ${d.x}`;
}

function getNodeColor(d) {
  if (d.depth === 0) return '#e94560';
  if (d.depth === 1) {
    const idx = d.parent ? d.parent.children.indexOf(d) : 0;
    return L1_COLORS[idx % L1_COLORS.length];
  }
  const status = d.data.status || 'active';
  return STATUS_COLORS[status] || STATUS_COLORS.active;
}

function truncateLabel(name, depth) {
  const maxLen = depth === 0 ? 30 : depth === 1 ? 40 : 55;
  if (name.length <= maxLen) return name;
  return name.substring(0, maxLen - 1) + '...';
}

// ─── Zoom controls ───
function zoomIn() {
  svgEl.transition().duration(300).call(zoomBehavior.scaleBy, 1.3);
}
function zoomOut() {
  svgEl.transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
}
function zoomFit() {
  const wrap = document.getElementById('mindmap-wrap');
  const t = d3.zoomIdentity.translate(wrap.clientWidth * 0.12, wrap.clientHeight / 2).scale(0.85);
  svgEl.transition().duration(500).call(zoomBehavior.transform, t);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  const wrap = document.getElementById('mindmap-wrap');
  svgEl.attr('width', wrap.clientWidth).attr('height', wrap.clientHeight);
});

// ─── Parse Daemon Log ───
function parseDaemonLog(md) {
  const lines = md.split('\n').filter(l => l.trim());
  let totalCycles = 0;
  let lastCycleTime = null;
  let lastStartTime = null;
  let firstTime = null;

  for (const line of lines) {
    const tsMatch = line.match(/^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} UTC)\]/);
    const ts = tsMatch ? tsMatch[1] : null;
    if (ts && !firstTime) firstTime = ts;
    if (line.includes('complete') && line.includes('Cycle')) {
      totalCycles++;
      if (ts) lastCycleTime = ts;
    }
    if (line.includes('Loop started') && ts) lastStartTime = ts;
  }

  return { totalCycles, lastCycleTime, lastStartTime, firstTime };
}

// ─── Parse Daily Log ───
function parseDailyLog(md) {
  const cycles = [];
  const blocks = md.split(/^## Cycle /m).slice(1);
  for (const block of blocks) {
    const headerMatch = block.match(/^(\d+)\s*[—\-]\s*(.+)/);
    if (!headerMatch) continue;
    const num = parseInt(headerMatch[1]);
    const ts = headerMatch[2].trim();
    const branchMatch = block.match(/\*\*Branches pushed\*\*:\s*(.+)/);
    const branches = branchMatch ? branchMatch[1] : '';
    cycles.push({ num, ts, branches });
  }
  return cycles;
}

// ─── Render Status Cards ───
function renderStatus(daemonData, dailyCycles, lastUpdate) {
  const el = document.getElementById('status-row');
  const lastDaemon = daemonData.lastCycleTime || 'N/A';
  const lastTrigger = dailyCycles.length > 0 ? dailyCycles[dailyCycles.length - 1].ts : 'N/A';

  let uptime = 'N/A';
  if (daemonData.firstTime) {
    const first = new Date(daemonData.firstTime.replace(' UTC', 'Z'));
    const now = new Date();
    const diffMs = now - first;
    const hours = Math.floor(diffMs / 3600000);
    if (hours > 24) {
      uptime = `${Math.floor(hours / 24)}d ${hours % 24}h`;
    } else {
      uptime = `${hours}h ${Math.floor((diffMs % 3600000) / 60000)}m`;
    }
  }

  el.innerHTML = `
    <div class="status-card">
      <div class="label">Last Daemon Cycle</div>
      <div class="value" style="font-size:0.85rem">${esc(lastDaemon)}</div>
    </div>
    <div class="status-card">
      <div class="label">Last Trigger Cycle</div>
      <div class="value" style="font-size:0.85rem">${esc(lastTrigger)}</div>
    </div>
    <div class="status-card">
      <div class="label">Daemon Cycles</div>
      <div class="value">${daemonData.totalCycles}</div>
    </div>
    <div class="status-card">
      <div class="label">Engine Cycles</div>
      <div class="value">${dailyCycles.length}</div>
    </div>
    <div class="status-card">
      <div class="label">Uptime</div>
      <div class="value">${uptime}</div>
    </div>
    <div class="status-card">
      <div class="label">Tree Updated</div>
      <div class="value" style="font-size:0.75rem">${esc(lastUpdate)}</div>
    </div>
  `;
}

// ─── Render Timeline Strip ───
function renderTimeline(cycles) {
  const el = document.getElementById('timeline-strip');
  const recent = cycles.slice(-8).reverse();
  if (!recent.length) {
    el.innerHTML = '<span style="color:var(--text-dim);font-size:0.72rem">No cycles yet</span>';
    return;
  }
  el.innerHTML = recent.map(c => `
    <div class="cycle-chip">
      <div class="cycle-num">Cycle ${c.num}</div>
      <div class="cycle-ts">${esc(c.ts)}</div>
      <div class="cycle-branches">${esc(c.branches)}</div>
    </div>
  `).join('');
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── Main ───
async function refresh() {
  try {
    const [treeRaw, daemonRaw, dailyRaw] = await Promise.all([
      fetchRaw(URLS.tree),
      fetchRaw(URLS.daemon),
      fetchRaw(URLS.daily),
    ]);

    const { tree, lastUpdate } = parseTreeToHierarchy(treeRaw);
    initMindMap(tree);

    const daemonData = parseDaemonLog(daemonRaw);
    const dailyCycles = parseDailyLog(dailyRaw);
    renderStatus(daemonData, dailyCycles, lastUpdate);
    renderTimeline(dailyCycles);
  } catch (err) {
    console.error('Refresh failed:', err);
    document.getElementById('mindmap-loading').textContent = 'Failed to load: ' + err.message;
    document.getElementById('mindmap-loading').style.color = '#f87171';
  }
}

refresh();
setInterval(refresh, 300000);
</script>
</body>
</html>
