<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數位永生 Dashboard</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-alt: #0f3460;
  --text: #e0e0e0;
  --text-dim: #888;
  --text-bright: #fff;
  --accent: #e94560;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --grey: #6b7280;
  --blue: #60a5fa;
  --border: #2a2a4a;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.2rem 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.header h1 {
  font-size: 1.3rem;
  color: var(--text-bright);
  font-weight: 600;
}

.header h1 span {
  color: var(--accent);
}

.header-meta {
  display: flex;
  gap: 1.5rem;
  align-items: center;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text-dim);
}

.header-meta .clock {
  color: var(--blue);
}

.header-meta .refresh-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.2rem;
  overflow: hidden;
}

.card-full { grid-column: 1 / -1; }

.card h2 {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 0.8rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.card h2 .badge {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 10px;
  font-weight: 400;
  font-family: var(--mono);
}

.badge-green { background: rgba(74, 222, 128, 0.15); color: var(--green); }
.badge-red { background: rgba(248, 113, 113, 0.15); color: var(--red); }
.badge-yellow { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
.badge-grey { background: rgba(107, 114, 128, 0.15); color: var(--grey); }

/* Status Grid */
.status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.8rem;
}

.status-item {
  background: var(--bg);
  border-radius: 6px;
  padding: 0.8rem;
}

.status-item .label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-family: var(--mono);
}

.status-item .value {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-bright);
  font-family: var(--mono);
  margin-top: 0.2rem;
}

.status-item .sub {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: var(--mono);
}

/* Dynamic Tree */
.tree {
  font-family: var(--mono);
  font-size: 0.82rem;
  line-height: 1.7;
}

.tree-section {
  margin-bottom: 0.3rem;
}

.tree-header {
  cursor: pointer;
  padding: 0.3rem 0.5rem;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  user-select: none;
  transition: background 0.15s;
}

.tree-header:hover { background: rgba(255,255,255,0.04); }

.tree-toggle {
  display: inline-block;
  width: 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 0.7rem;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.tree-toggle.open { transform: rotate(90deg); }

.tree-header .priority-bar {
  width: 3px;
  height: 16px;
  border-radius: 2px;
  flex-shrink: 0;
}

.tree-children {
  padding-left: 1.5rem;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.tree-children.collapsed { max-height: 0 !important; }

.tree-leaf {
  padding: 0.15rem 0.5rem 0.15rem 1.8rem;
  color: var(--text-dim);
  font-size: 0.78rem;
  border-left: 1px solid var(--border);
  margin-left: 0.5rem;
}

.tree-leaf.done { color: var(--green); }
.tree-leaf.active { color: var(--yellow); }
.tree-leaf.blocked { color: var(--grey); text-decoration: line-through; opacity: 0.6; }

.status-icon { flex-shrink: 0; font-size: 0.75rem; }

/* Regime indicator */
.regime-section {
  margin-top: 0.8rem;
  padding: 0.6rem 0.8rem;
  background: var(--bg);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 0.78rem;
}

.regime-section .regime-label {
  color: var(--text-dim);
  font-size: 0.7rem;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}

.regime-tag {
  display: inline-block;
  padding: 0.1rem 0.5rem;
  border-radius: 3px;
  margin: 0.15rem 0.2rem;
  font-size: 0.72rem;
}

.regime-attack { background: rgba(248,113,113,0.15); color: var(--red); }
.regime-neutral { background: rgba(96,165,250,0.15); color: var(--blue); }
.regime-defense { background: rgba(107,114,128,0.15); color: var(--grey); }

/* Timeline */
.timeline {
  font-family: var(--mono);
  font-size: 0.78rem;
}

.timeline-entry {
  padding: 0.6rem 0.8rem;
  border-left: 2px solid var(--border);
  margin-left: 0.5rem;
  margin-bottom: 0.5rem;
  position: relative;
}

.timeline-entry::before {
  content: '';
  position: absolute;
  left: -5px;
  top: 0.8rem;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
}

.timeline-entry .ts {
  color: var(--blue);
  font-size: 0.72rem;
}

.timeline-entry .branches {
  color: var(--yellow);
  font-size: 0.72rem;
  margin-top: 0.15rem;
}

.timeline-entry .summary {
  color: var(--text);
  font-size: 0.76rem;
  margin-top: 0.3rem;
}

.timeline-entry .summary li {
  margin-left: 1rem;
  margin-bottom: 0.1rem;
}

/* Log entries */
.log-entries {
  font-family: var(--mono);
  font-size: 0.75rem;
  max-height: 300px;
  overflow-y: auto;
}

.log-line {
  padding: 0.2rem 0.4rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.log-line .log-ts { color: var(--blue); }
.log-line .log-msg { color: var(--text-dim); }
.log-line.cycle-start { color: var(--yellow); }
.log-line.cycle-end { color: var(--green); }
.log-line.error { color: var(--red); }

/* Loading / error */
.loading {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 1rem;
  text-align: center;
}

.error-msg {
  color: var(--red);
  font-family: var(--mono);
  font-size: 0.78rem;
  padding: 0.5rem;
  background: rgba(248,113,113,0.08);
  border-radius: 4px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; }
  .header { padding: 0.8rem 1rem; }
  .header h1 { font-size: 1.1rem; }
  .header-meta { font-size: 0.7rem; }
  .status-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 480px) {
  .status-grid { grid-template-columns: 1fr; }
  .container { padding: 0.5rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>數位永生</span> &mdash; Digital Immortality Dashboard</h1>
  <div class="header-meta">
    <span class="clock" id="clock"></span>
    <span><span class="refresh-dot"></span> auto-refresh 60s</span>
  </div>
</div>

<div class="container">
  <!-- System Status -->
  <div class="card card-full">
    <h2>System Status</h2>
    <div class="status-grid" id="status-grid">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Dynamic Tree -->
  <div class="card card-full">
    <h2>Dynamic Tree <span class="badge badge-yellow" id="tree-updated"></span></h2>
    <div id="dynamic-tree" class="tree">
      <div class="loading">Loading dynamic_tree.md...</div>
    </div>
  </div>

  <!-- Recent Cycles (daily_log) -->
  <div class="card">
    <h2>Recent Cycles <span class="badge badge-green" id="cycle-count-badge"></span></h2>
    <div id="daily-timeline" class="timeline">
      <div class="loading">Loading daily_log.md...</div>
    </div>
  </div>

  <!-- Daemon Log -->
  <div class="card">
    <h2>Daemon Log <span class="badge badge-grey" id="daemon-badge"></span></h2>
    <div id="daemon-log" class="log-entries">
      <div class="loading">Loading daemon_log.md...</div>
    </div>
  </div>
</div>

<script>
const RAW_BASE = 'https://raw.githubusercontent.com/l12203685/digital-immortality/main/results';
const URLS = {
  tree: `${RAW_BASE}/dynamic_tree.md`,
  daemon: `${RAW_BASE}/daemon_log.md`,
  daily: `${RAW_BASE}/daily_log.md`,
};

// --- Clock (Taipei) ---
function updateClock() {
  const now = new Date();
  const taipei = now.toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
  document.getElementById('clock').textContent = taipei + ' (Taipei)';
}
setInterval(updateClock, 1000);
updateClock();

// --- Fetch with cache-bust ---
async function fetchRaw(url) {
  const res = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

// --- Parse Dynamic Tree ---
function parseTree(md) {
  const lines = md.split('\n');
  const sections = [];
  let current = null;
  let regime = null;
  let milestones = [];
  let evolution = [];
  let lastUpdate = '';

  for (const line of lines) {
    // Last update timestamp
    const upMatch = line.match(/最後更新：(.+)/);
    if (upMatch) { lastUpdate = upMatch[1]; continue; }

    // L1 section: ### N. Title
    const secMatch = line.match(/^### (\d+)\.\s+(.+)/);
    if (secMatch) {
      current = {
        id: secMatch[1],
        title: secMatch[2],
        children: [],
        status: 'active',
      };
      // Detect status from title
      if (current.title.includes('DEADLINE')) current.status = 'deadline';
      sections.push(current);
      continue;
    }

    // L2 branch: - N.N ...
    const brMatch = line.match(/^- (\d+\.\d+)\s+(.+)/);
    if (brMatch && current) {
      let text = brMatch[2];
      let status = 'active';
      if (text.includes('✓')) status = 'done';
      else if (text.includes('blocked') || text.includes('待')) status = 'blocked';
      current.children.push({ id: brMatch[1], text, status });
      continue;
    }

    // Sub-items under L2: indented with -
    const subMatch = line.match(/^\s{2,}-\s+(.+)/);
    if (subMatch && current && current.children.length > 0) {
      let text = subMatch[1];
      let status = 'active';
      if (text.includes('✓')) status = 'done';
      else if (text.includes('blocked') || text.includes('待')) status = 'blocked';
      current.children.push({ id: '', text: '  ' + text, status, isSub: true });
      continue;
    }

    // CONSTRAINT line
    if (line.match(/^- CONSTRAINT/) && current) {
      current.children.push({ id: '', text: line.replace(/^- /, ''), status: 'blocked', isSub: true });
      continue;
    }

    // Regime
    const regimeMatch = line.match(/^(攻擊|中性|防禦)[：:]\s*(.+)/);
    if (regimeMatch) {
      if (!regime) regime = {};
      const key = regimeMatch[1] === '攻擊' ? 'attack' : regimeMatch[1] === '中性' ? 'neutral' : 'defense';
      regime[key] = regimeMatch[2];
      continue;
    }

    // Milestones
    if (line.match(/^- .+/) && md.indexOf(line) > md.indexOf('已完成 milestones') && md.indexOf(line) < md.indexOf('演化紀錄')) {
      milestones.push(line.replace(/^- /, ''));
    }
  }

  return { sections, regime, milestones, evolution, lastUpdate };
}

function renderTree(data) {
  const el = document.getElementById('dynamic-tree');
  if (!data.sections.length) {
    el.innerHTML = '<div class="error-msg">Failed to parse dynamic tree</div>';
    return;
  }

  document.getElementById('tree-updated').textContent = data.lastUpdate || '';

  // Priority coloring: section 1 = red (highest), then gradient
  const priorityColors = ['#f87171', '#fbbf24', '#60a5fa', '#a78bfa', '#4ade80', '#6b7280'];

  let html = '';

  for (let i = 0; i < data.sections.length; i++) {
    const sec = data.sections[i];
    const color = priorityColors[i] || priorityColors[priorityColors.length - 1];
    const childCount = sec.children.filter(c => !c.isSub).length;
    const doneCount = sec.children.filter(c => !c.isSub && c.status === 'done').length;

    html += `<div class="tree-section">`;
    html += `<div class="tree-header" onclick="toggleTree(this)">`;
    html += `<span class="tree-toggle open">&#9654;</span>`;
    html += `<span class="priority-bar" style="background:${color}"></span>`;
    html += `<span style="color:${color};font-weight:600">${sec.id}. ${sec.title.replace(/⚡.*/, '')}</span>`;
    if (sec.title.includes('DEADLINE')) html += `<span class="badge badge-red" style="margin-left:auto">DEADLINE</span>`;
    if (childCount > 0) html += `<span style="color:var(--text-dim);margin-left:auto;font-size:0.7rem">${doneCount}/${childCount}</span>`;
    html += `</div>`;

    html += `<div class="tree-children" style="max-height:2000px">`;
    for (const child of sec.children) {
      const cls = child.status === 'done' ? 'done' : child.status === 'blocked' ? 'blocked' : 'active';
      const icon = child.status === 'done' ? '<span class="status-icon" style="color:var(--green)">&#10003;</span> '
        : child.status === 'blocked' ? '<span class="status-icon" style="color:var(--grey)">&#9679;</span> '
        : '<span class="status-icon" style="color:var(--yellow)">&#9889;</span> ';
      html += `<div class="tree-leaf ${cls}">${child.isSub ? '' : icon}${escapeHtml(child.text)}</div>`;
    }
    html += `</div></div>`;
  }

  // Regime
  if (data.regime) {
    html += `<div class="regime-section">`;
    html += `<div class="regime-label">Current Regime</div>`;
    if (data.regime.attack) html += `<span class="regime-tag regime-attack">攻擊 ${escapeHtml(data.regime.attack)}</span>`;
    if (data.regime.neutral) html += `<span class="regime-tag regime-neutral">中性 ${escapeHtml(data.regime.neutral)}</span>`;
    if (data.regime.defense) html += `<span class="regime-tag regime-defense">防禦 ${escapeHtml(data.regime.defense)}</span>`;
    html += `</div>`;
  }

  el.innerHTML = html;
}

function toggleTree(header) {
  const toggle = header.querySelector('.tree-toggle');
  const children = header.nextElementSibling;
  if (children && children.classList.contains('tree-children')) {
    children.classList.toggle('collapsed');
    toggle.classList.toggle('open');
  }
}

// --- Parse Daily Log ---
function parseDailyLog(md) {
  const cycles = [];
  const blocks = md.split(/^## Cycle /m).slice(1);

  for (const block of blocks) {
    const headerMatch = block.match(/^(\d+)\s*—\s*(.+)/);
    if (!headerMatch) continue;

    const num = parseInt(headerMatch[1]);
    const ts = headerMatch[2].trim();

    const branchMatch = block.match(/\*\*Branches pushed\*\*:\s*(.+)/);
    const branches = branchMatch ? branchMatch[1] : '';

    // Extract ### Branch sections
    const impacts = [];
    const impactMatches = block.matchAll(/\*\*Impact\*\*:\s*(.+)/g);
    for (const m of impactMatches) impacts.push(m[1]);

    cycles.push({ num, ts, branches, impacts });
  }

  return cycles;
}

function renderDailyLog(cycles) {
  const el = document.getElementById('daily-timeline');
  const badge = document.getElementById('cycle-count-badge');
  badge.textContent = `${cycles.length} cycles`;

  // Show last 5
  const recent = cycles.slice(-5).reverse();

  if (!recent.length) {
    el.innerHTML = '<div class="loading">No cycle entries found</div>';
    return;
  }

  let html = '';
  for (const c of recent) {
    html += `<div class="timeline-entry">`;
    html += `<div class="ts">Cycle ${c.num} &mdash; ${escapeHtml(c.ts)}</div>`;
    html += `<div class="branches">${escapeHtml(c.branches)}</div>`;
    if (c.impacts.length) {
      html += `<div class="summary"><ul>`;
      for (const imp of c.impacts.slice(0, 4)) {
        html += `<li>${escapeHtml(imp)}</li>`;
      }
      if (c.impacts.length > 4) html += `<li>...+${c.impacts.length - 4} more</li>`;
      html += `</ul></div>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;
}

// --- Parse Daemon Log ---
function parseDaemonLog(md) {
  const lines = md.split('\n').filter(l => l.trim());
  const entries = [];
  let totalCycles = 0;
  let lastCycleTime = null;
  let lastStartTime = null;
  let firstTime = null;

  for (const line of lines) {
    const tsMatch = line.match(/^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} UTC)\]/);
    const ts = tsMatch ? tsMatch[1] : null;

    if (ts && !firstTime) firstTime = ts;

    let type = 'normal';
    if (line.includes('Cycle') && line.includes('starting')) type = 'cycle-start';
    else if (line.includes('Cycle') && line.includes('complete')) type = 'cycle-end';
    else if (line.includes('SIGTERM') || line.includes('Shutdown') || line.includes('error')) type = 'error';

    if (line.includes('complete') && line.includes('Cycle')) {
      totalCycles++;
      if (ts) lastCycleTime = ts;
    }

    if (line.includes('Loop started') && ts) lastStartTime = ts;

    entries.push({ ts, text: line, type });
  }

  return { entries, totalCycles, lastCycleTime, lastStartTime, firstTime };
}

function renderDaemonLog(data) {
  const el = document.getElementById('daemon-log');
  const badge = document.getElementById('daemon-badge');
  badge.textContent = `${data.totalCycles} daemon cycles`;

  // Show last 20 lines
  const recent = data.entries.slice(-20);

  if (!recent.length) {
    el.innerHTML = '<div class="loading">No daemon log entries</div>';
    return;
  }

  let html = '';
  for (const e of recent) {
    html += `<div class="log-line ${e.type}">`;
    if (e.ts) html += `<span class="log-ts">[${e.ts}]</span> `;
    const msg = e.ts ? e.text.replace(/^\[.*?\]\s*/, '') : e.text;
    html += `<span class="log-msg">${escapeHtml(msg)}</span>`;
    html += `</div>`;
  }

  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// --- System Status ---
function renderStatus(daemonData, dailyCycles) {
  const el = document.getElementById('status-grid');

  const lastDaemon = daemonData.lastCycleTime || 'N/A';
  const lastTrigger = dailyCycles.length > 0 ? dailyCycles[dailyCycles.length - 1].ts : 'N/A';
  const totalDaemonCycles = daemonData.totalCycles;
  const totalDailyCycles = dailyCycles.length;

  // Uptime estimate
  let uptime = 'N/A';
  if (daemonData.firstTime) {
    const first = new Date(daemonData.firstTime.replace(' UTC', 'Z'));
    const now = new Date();
    const diffMs = now - first;
    const hours = Math.floor(diffMs / 3600000);
    const mins = Math.floor((diffMs % 3600000) / 60000);
    if (hours > 24) {
      const days = Math.floor(hours / 24);
      uptime = `${days}d ${hours % 24}h`;
    } else {
      uptime = `${hours}h ${mins}m`;
    }
  }

  el.innerHTML = `
    <div class="status-item">
      <div class="label">Last Daemon Cycle</div>
      <div class="value" style="font-size:0.9rem">${escapeHtml(lastDaemon)}</div>
    </div>
    <div class="status-item">
      <div class="label">Last Trigger Cycle</div>
      <div class="value" style="font-size:0.9rem">${escapeHtml(lastTrigger)}</div>
    </div>
    <div class="status-item">
      <div class="label">Uptime (from first log)</div>
      <div class="value">${uptime}</div>
    </div>
    <div class="status-item">
      <div class="label">Daemon Cycles</div>
      <div class="value">${totalDaemonCycles}</div>
    </div>
    <div class="status-item">
      <div class="label">Engine Cycles</div>
      <div class="value">${totalDailyCycles}</div>
    </div>
    <div class="status-item">
      <div class="label">Branches Active</div>
      <div class="value">6</div>
      <div class="sub">L1 domains</div>
    </div>
  `;
}

// --- Utility ---
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Main Loop ---
async function refresh() {
  try {
    const [treeRaw, daemonRaw, dailyRaw] = await Promise.all([
      fetchRaw(URLS.tree),
      fetchRaw(URLS.daemon),
      fetchRaw(URLS.daily),
    ]);

    const treeData = parseTree(treeRaw);
    renderTree(treeData);

    const daemonData = parseDaemonLog(daemonRaw);
    renderDaemonLog(daemonData);

    const dailyCycles = parseDailyLog(dailyRaw);
    renderDailyLog(dailyCycles);

    renderStatus(daemonData, dailyCycles);
  } catch (err) {
    console.error('Refresh failed:', err);
  }
}

refresh();
setInterval(refresh, 60000);
</script>
