<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數位永生</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;--card:#222244;--text:#ccc;--bright:#fff;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--grey:#555;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans TC',system-ui,sans-serif;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

header{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1.2rem;border-bottom:1px solid #2a2a4a}
header h1{font-size:1.1rem;font-weight:700;color:var(--bright);letter-spacing:.08em}
.header-right{display:flex;align-items:center;gap:.7rem;font-size:.78rem;color:#888;font-family:var(--mono)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.hero{text-align:center;padding:1.8rem 1rem 1.2rem}
.hero-main{font-size:1.8rem;font-weight:900;color:var(--bright);line-height:1.3}
.hero-sub{margin-top:.5rem;font-size:.95rem;color:#888;font-family:var(--mono)}
.hero-deadline{margin-top:.3rem;font-size:.75rem;color:var(--red);font-family:var(--mono)}

.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem;padding:0 1rem;max-width:600px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:14px;padding:.9rem 1rem;display:flex;gap:.8rem;align-items:flex-start;cursor:default;border:2px solid transparent;transition:border-color .15s}
.card:hover{border-color:#444}
.card-icon{font-size:1.8rem;flex-shrink:0;line-height:1}
.card-body{flex:1;min-width:0}
.card-title{font-size:1rem;font-weight:700;color:var(--bright);display:flex;align-items:center;gap:.45rem}
.card-status{font-size:.75rem;color:#999;margin-top:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-detail{font-size:.65rem;color:#666;margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-green{background:var(--green)}.dot-yellow{background:var(--yellow)}.dot-red{background:var(--red)}.dot-grey{background:var(--grey)}

.feed{flex:1;overflow-y:auto;padding:.8rem 1.2rem;margin-top:.6rem;border-top:1px solid #2a2a4a}
.feed-title{font-size:.7rem;color:#555;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);margin-bottom:.4rem}
.feed-item{font-size:.72rem;font-family:var(--mono);color:#666;padding:.18rem 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-item .ts{color:#555}

.outbox{padding:.8rem 1.2rem;border-top:1px solid #2a2a4a;max-height:40vh;overflow-y:auto}
.outbox-title{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);margin-bottom:.5rem;display:flex;justify-content:space-between}
.outbox-updated{color:#555;font-weight:400}
.out-item{background:#1d1d38;border-left:2px solid var(--green);padding:.5rem .7rem;margin-bottom:.4rem;border-radius:4px;font-size:.78rem;color:#ccc;white-space:pre-wrap;word-break:break-word}
.out-item .ots{font-size:.62rem;color:#666;font-family:var(--mono);display:block;margin-bottom:.2rem}

.stats{display:flex;justify-content:center;gap:2rem;padding:.5rem 1rem;font-size:.7rem;color:#555;font-family:var(--mono);border-top:1px solid #2a2a4a}

@media(min-width:520px){.cards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:360px){
  .hero-main{font-size:1.3rem}
  .cards{gap:.5rem;padding:0 .6rem}
  .card{padding:.7rem .8rem}
  .card-icon{font-size:1.4rem}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<header>
  <h1>數位永生</h1>
  <div class="header-right">
    <span id="clock"></span>
    <span class="live-dot"></span>
    <span style="color:var(--green);font-size:.7rem">live</span>
  </div>
</header>

<div class="hero">
  <div class="hero-main" id="hero-main">Loading...</div>
  <div class="hero-sub" id="hero-sub"></div>
  <div class="hero-deadline" id="hero-deadline"></div>
</div>

<div class="cards" id="cards"></div>

<div class="feed">
  <div class="feed-title">Recent Activity</div>
  <div id="feed"></div>
</div>

<div class="outbox">
  <div class="outbox-title">
    <span>Agent Output</span>
    <span class="outbox-updated" id="outbox-updated">--</span>
  </div>
  <div id="outbox"></div>
</div>

<div class="stats" id="stats"></div>

<script>
var RAW = 'https://raw.githubusercontent.com/l12203685/digital-immortality/main/results/dashboard_state.json';
var OUTBOX_RAW = 'https://raw.githubusercontent.com/l12203685/LIN-YING-HUNG/main/agent/dashboard_outbox.json';

function tick() {
  var d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('zh-TW', {
    timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}
setInterval(tick, 1000); tick();

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function render(data) {
  document.getElementById('hero-main').textContent = data.regime || 'Running';
  document.getElementById('hero-sub').textContent = data.regime_neutral ? '\u4e2d\u6027: ' + data.regime_neutral : '';
  document.getElementById('hero-deadline').textContent = data.deadline
    ? 'DEADLINE ' + data.deadline + ' \u2014 ' + data.days_remaining + ' days'
    : '';

  var cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  (data.cards || []).forEach(function(c) {
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      '<div class="card-icon">' + esc(c.icon) + '</div>' +
      '<div class="card-body">' +
        '<div class="card-title"><span class="dot dot-' + esc(c.color) + '"></span>' + esc(c.name) + '</div>' +
        '<div class="card-status">' + esc(c.status) + '</div>' +
        '<div class="card-detail">' + esc(c.detail) + '</div>' +
      '</div>';
    cardsEl.appendChild(div);
  });

  var feedEl = document.getElementById('feed');
  feedEl.innerHTML = (data.activity || []).map(function(a) {
    return '<div class="feed-item"><span class="ts">' + esc(a.time) + '</span> \u2014 ' + esc(a.text) + '</div>';
  }).join('');

  var s = data.stats || {};
  document.getElementById('stats').innerHTML =
    '<span>cycles: ' + (s.daemon_cycles || 0) + '</span>' +
    '<span>MDs: ' + (s.total_mds || 0) + '</span>' +
    '<span>dna: ' + (s.dna_core_lines || 0) + 'L</span>' +
    '<span>updated: ' + esc(data.updated || '') + '</span>';
}

async function refresh() {
  try {
    var r = await fetch(RAW + '?t=' + Date.now(), {cache: 'no-store'});
    if (!r.ok) throw new Error(r.status);
    var data = await r.json();
    render(data);
  } catch (e) {
    document.getElementById('hero-main').textContent = 'Offline';
    document.getElementById('hero-sub').textContent = e.message;
  }
}

async function refreshOutbox() {
  try {
    var r = await fetch(OUTBOX_RAW + '?t=' + Date.now(), {cache: 'no-store'});
    if (!r.ok) throw new Error(r.status);
    var d = await r.json();
    document.getElementById('outbox-updated').textContent = d.updated || '';
    var box = document.getElementById('outbox');
    var entries = (d.entries || []).slice().reverse();
    box.innerHTML = entries.map(function(e) {
      var ts = e.ts || e.time || '';
      var text = e.text || e.content || e.message || JSON.stringify(e);
      return '<div class="out-item"><span class="ots">' + esc(ts) + '</span>' + esc(text) + '</div>';
    }).join('') || '<div class="out-item" style="color:#555;border-left-color:#333">(no output yet)</div>';
  } catch (e) {
    document.getElementById('outbox-updated').textContent = 'offline: ' + e.message;
  }
}

refresh();
refreshOutbox();
setInterval(refresh, 300000);
setInterval(refreshOutbox, 60000);
</script>
</body>
</html>
