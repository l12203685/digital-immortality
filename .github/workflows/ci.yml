name: Digital Immortality CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cold-start-validation:
    name: Cold-Start Boot Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Branch 6 — Cold-start boot test (5/5 required)
        run: python cold_start_test.py

      - name: Branch 2.3 — Behavioral consistency (33/33 required)
        run: python consistency_test.py templates/dna_core.md

      - name: Branch 6 — Multi-provider import check
        run: python -c "from platform.multi_provider import available_providers; print('multi_provider import OK')"

  trading-import:
    name: Trading Module Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Branch 1.1 — Paper-live runner import (no credentials needed)
        run: python -c "import sys; sys.path.insert(0, '.'); from trading import strategies; print('trading import OK')"

      - name: Branch 6.5 — Scope separation (no cross-layer file conflicts)
        run: python -c "
import json, os
layers = {
    'L1_trading': ['results/paper_live_log.jsonl', 'results/mainnet_log.jsonl'],
    'L1_engine':  ['staging/last_output.md', 'staging/next_input.md'],
    'L2_eval':    ['results/daemon_log.md', 'results/dynamic_tree.md'],
    'L3_evolve':  ['templates/dna_core.md', 'results/consistency_baseline.json'],
}
all_files = [f for files in layers.values() for f in files]
assert len(all_files) == len(set(all_files)), 'SCOPE VIOLATION: same file in multiple layers'
print('Scope separation OK — no cross-layer file conflicts')
"
