name: Type A Heartbeat

on:
  schedule:
    - cron: '1 2 * * *'  # 02:01 UTC = 10:01 Taipei (post weekly-limit reset)
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Type A heartbeat
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python platform/heartbeat_typeA.py

      - name: Upload heartbeat report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heartbeat-report
          path: results/heartbeat_*.json
